<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Truco Argentino - Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;color:#0f0;font-family:'Courier New',monospace;height:100vh;display:flex;flex-direction:column}
#bar{
  background:#111;padding:10px 20px;border-bottom:2px solid #0f0;
  display:flex;align-items:center;gap:15px;flex-wrap:wrap
}
#bar h1{font-size:16px;letter-spacing:2px}
#bar label{font-size:13px;color:#aaa}
#bar input{padding:4px 8px;background:#000;color:#0f0;border:1px solid #0f0;font-family:inherit;font-size:13px;width:130px}
#bar input:focus{outline:none;box-shadow:0 0 6px #0f0}
#bar button{padding:5px 14px;background:#0f0;color:#000;border:none;font-family:inherit;font-weight:bold;cursor:pointer;font-size:13px}
#bar button:disabled{opacity:.4;cursor:default}
#bar #status{font-size:12px;margin-left:auto}
.ok{color:#0f0}
.err{color:#f44}
#output{
  flex:1;overflow-y:auto;padding:15px 20px;font-size:14px;line-height:1.6;
  background:#0a0a0a;white-space:pre-wrap;word-break:break-word
}
#output .msg{color:#0f0}
#output .card{color:#ff0;background:#222;padding:2px 6px;border-radius:3px}
#output .event-title{color:#0f0;font-weight:bold}
#output .event-info{color:#aaa}
#output .highlight{color:#0ff}
#output .warning{color:#fa0}
#output .error{color:#f44}
#output .separator{color:#333;display:block;margin:6px 0;border-top:1px solid #333}

#input-area{display:flex;padding:10px 20px;background:#111;border-top:2px solid #0f0;gap:10px}
#input-area input{flex:1;padding:8px 12px;background:#000;color:#0f0;border:1px solid #333;font-family:inherit;font-size:14px}
#input-area input:focus{outline:none;border-color:#0f0}
#input-area button{padding:8px 18px;background:#0f0;color:#000;border:none;font-family:inherit;font-weight:bold;cursor:pointer;font-size:14px}
#input-area button:disabled{opacity:.4;cursor:default}
#input-area .hint{color:#555;font-size:12px;align-self:center}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;
  justify-content:center;align-items:center;flex-direction:column;gap:20px}
#overlay.show{display:flex}
#overlay h2{color:#0f0;font-size:24px}
#overlay p{color:#aaa;font-size:14px}
</style>
</head>
<body>

<div id="bar">
  <h1>⚡ TRUCO TERMINAL</h1>
  <label>Jugador:</label>
  <input id="playerName" value="jugador1" placeholder="ej: jugador1">
  <button id="connectBtn">Conectar</button>
  <span id="status">Desconectado</span>
</div>

<div id="output">
  <div class="msg">Bienvenido al Truco Argentino.<br>Ingresá tu nombre y presioná Conectar.</div>
</div>

<div id="input-area">
  <input id="input" placeholder="Esperando conexión..." disabled>
  <button id="sendBtn" disabled>Enviar</button>
  <span class="hint" id="hint"></span>
</div>

<div id="overlay">
  <h2>🃏 Partida Terminada</h2>
  <p id="overlayMsg"></p>
  <button onclick="reconnect()" style="padding:10px 30px;background:#0f0;color:#000;border:none;font-size:16px;cursor:pointer">Volver a jugar</button>
</div>

<script>
let ws = null;
let miTurno = false;
let jugador = '';
let esperandoInput = false;

const output = document.getElementById('output');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const connectBtn = document.getElementById('connectBtn');
const playerName = document.getElementById('playerName');
const hint = document.getElementById('hint');
const overlay = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlayMsg');

function log(html, cls='msg') {
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = html;
  output.appendChild(d);
  output.scrollTop = output.scrollHeight;
}

function status(msg, cls='') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

function setEnabled(v) {
  input.disabled = !v;
  sendBtn.disabled = !v;
}

function conectar() {
  const name = playerName.value.trim();
  if (!name) { log('<span class="error">ERROR: ingresá un nombre de jugador</span>', 'error'); return; }
  jugador = name;

  ws = new WebSocket('ws://localhost:8080/ws');

  ws.onopen = () => {
    log(`Conectado como <span class="highlight">${jugador}</span>`, 'msg');
    status(`Conectado como ${jugador}`, 'ok');
    connectBtn.disabled = true;
    playerName.disabled = true;
    ws.send(JSON.stringify({jugador}));
    setEnabled(false);
    hint.textContent = 'Esperando oponente...';
  };

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch(_) { return; }

    if (data.tipo === 'cartas') {
      mostrarCartas(data.cartas);
      return;
    }

    if (data.tipo === 'evento') {
      manejarEvento(data.mensaje);
    }
  };

  ws.onclose = () => {
    log('<span class="error">Conexión cerrada</span>', 'error');
    status('Desconectado', 'err');
    connectBtn.disabled = false;
    playerName.disabled = false;
    setEnabled(false);
    hint.textContent = '';
    miTurno = false;
  };

  ws.onerror = () => {
    log('<span class="error">ERROR: no se pudo conectar al servidor</span>', 'error');
    status('Error de conexión', 'err');
    connectBtn.disabled = false;
    playerName.disabled = false;
  };
}

function mostrarCartas(cartasStr) {
  log('<span class="separator"></span>', '');
  log('<span class="event-title">🃏 TUS CARTAS</span>', 'event-title');
  const cartas = parsearCartas(cartasStr);
  cartas.forEach((c,i) => {
    log(`<span class="card">${i+1} → ${c}</span>`, 'card');
  });
  log('<span class="separator"></span>', '');
}

function parsearCartas(str) {
  try {
    const limpio = str.replace(/[\[\]]/g, '').trim();
    if (!limpio) return [];
    const partes = limpio.split('),');
    const cartas = [];
    for (let i = 0; i < partes.length; i++) {
      let p = partes[i].trim();
      if (i < partes.length - 1) p += ')';
      cartas.push(p);
    }
    return cartas;
  } catch(_) {
    return [str];
  }
}

function manejarEvento(evStr) {
  const ev = evStr.replace(/^['"]|['"]$/g, '');

  if (ev === 'inicio_partida') {
    log('<span class="separator"></span>', '');
    log('<span class="event-title">🎮 INICIO DE PARTIDA</span>', 'event-title');
    log('<span class="separator"></span>', '');
    hint.textContent = '';
    return;
  }

  if (ev.startsWith('partida_terminada')) {
    const m = ev.match(/partida_terminada\((\w+),\s*(\d+),\s*(\d+)\)/);
    if (m) {
      const ganador = m[1], p1 = m[2], p2 = m[3];
      log('<span class="separator"></span>', '');
      log(`<span class="event-title">🏆 PARTIDA TERMINADA</span>`, 'event-title');
      log(`Ganador: <span class="highlight">${ganador}</span> — ${p1} a ${p2}`, 'highlight');
      overlayMsg.innerHTML = `Ganó <strong>${ganador}</strong> — ${p1} a ${p2}`;
      overlay.classList.add('show');
    }
    setEnabled(false);
    miTurno = false;
    return;
  }

  if (ev.startsWith('estado_mano')) {
    const m = ev.match(/estado_mano\((\w+),\s*(\d+),\s*(\d+)\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">📊 PUNTAJE</span>', 'event-title');
      log(`Jugador1: <span class="highlight">${m[2]}</span> | Jugador2: <span class="highlight">${m[3]}</span>`, 'event-info');
      log(`Mano: <span class="warning">${m[1]}</span>`, 'warning');
      log('<span class="separator"></span>', '');
    }
    return;
  }

  if (ev.startsWith('ganador_mano')) {
    const m = ev.match(/ganador_mano\((\w+),\s*(\d+)\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">✅ FIN DE LA MANO</span>', 'event-title');
      log(`Ganador: <span class="highlight">${m[1]}</span> — ${m[2]} punto(s)`, 'highlight');
      log('<span class="separator"></span>', '');
    }
    return;
  }

  if (ev.startsWith('ganador_baza')) {
    const m = ev.match(/ganador_baza\((\w+)\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">⚔️ RESULTADO DE LA BAZA</span>', 'event-title');
      log(`Ganó: <span class="highlight">${m[1]}</span>`, 'highlight');
      log('<span class="separator"></span>', '');
    }
    return;
  }

  if (ev.startsWith('carta_jugada')) {
    const m = ev.match(/carta_jugada\((\w+),(.+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> jugó <span class="card">${m[2]}</span>`, 'msg');
    return;
  }

  if (ev.startsWith('canto_truco')) {
    const m = ev.match(/canto_truco\((\w+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> cantó <span class="highlight">TRUCO</span>`, 'warning');
    return;
  }

  if (ev.startsWith('canto_retruco')) {
    const m = ev.match(/canto_retruco\((\w+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> cantó <span class="highlight">RETRUCO</span>`, 'warning');
    return;
  }

  if (ev.startsWith('canto_vale4')) {
    const m = ev.match(/canto_vale4\((\w+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> cantó <span class="highlight">VALE 4</span>`, 'warning');
    return;
  }

  if (ev.startsWith('acepto_truco')) {
    const m = ev.match(/acepto_truco\((\w+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> aceptó el truco`, 'msg');
    return;
  }

  if (ev.startsWith('no_quiero')) {
    const m = ev.match(/no_quiero\((\w+)\)/);
    if (m) log(`<span class="warning">${m[1]}</span> no quiso`, 'msg');
    return;
  }

  if (ev.startsWith('estado_apuesta')) {
    const m = ev.match(/estado_apuesta\((.+)\)/);
    if (m) log(`Apuesta: <span class="event-info">${m[1]}</span>`, 'event-info');
    return;
  }

  if (ev.startsWith('turno_carta') && ev.includes(jugador)) {
    log('<span class="separator"></span>', '');
    log('<span class="event-title">🎯 TU TURNO — ELEGÍ UNA CARTA</span>', 'event-title');
    log('Ingresá el <span class="highlight">número</span> de la carta que querés jugar (o <span class="error">no</span> para abandonar)', 'event-info');
    miTurno = true;
    esperandoInput = true;
    setEnabled(true);
    input.focus();
    hint.textContent = 'Ingresá un número (1-3) o "no"';
    return;
  }

  if (ev.startsWith('turno_apuesta') && ev.includes(jugador)) {
    const m = ev.match(/turno_apuesta\((\w+),\[(.+)\]\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">💰 TURNO DE APUESTA</span>', 'event-title');
      log(`Opciones: <span class="highlight">${m[2]}</span>`, 'highlight');
      miTurno = true;
      esperandoInput = true;
      setEnabled(true);
      input.focus();
      hint.textContent = `Opciones: ${m[2].replace(/,/g, ', ')}`;
    }
    return;
  }

  if (ev.startsWith('turno_retruco') && ev.includes(jugador)) {
    const m = ev.match(/turno_retruco\((\w+),\[(.+)\]\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">💰 TURNO DE RETRUCO</span>', 'event-title');
      log(`Opciones: <span class="highlight">${m[2]}</span>`, 'highlight');
      miTurno = true;
      esperandoInput = true;
      setEnabled(true);
      input.focus();
      hint.textContent = `Opciones: ${m[2].replace(/,/g, ', ')}`;
    }
    return;
  }

  if (ev.startsWith('turno_vale4') && ev.includes(jugador)) {
    log('<span class="separator"></span>', '');
    log('<span class="event-title">💰 TURNO DE VALE 4</span>', 'event-title');
    log('Opciones: <span class="highlight">vale4, nada</span>', 'highlight');
    miTurno = true;
    esperandoInput = true;
    setEnabled(true);
    input.focus();
    hint.textContent = 'Opciones: vale4, nada';
    return;
  }

  if (ev.startsWith('responder_truco') && ev.includes(jugador)) {
    const m = ev.match(/responder_truco\((\w+),\[(.+)\]\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">🤔 TE OFRECIERON TRUCO</span>', 'event-title');
      log(`Opciones: <span class="highlight">${m[2]}</span>`, 'highlight');
      miTurno = true;
      esperandoInput = true;
      setEnabled(true);
      input.focus();
      hint.textContent = `Opciones: ${m[2].replace(/,/g, ', ')}`;
    }
    return;
  }

  if (ev.startsWith('responder_retruco') && ev.includes(jugador)) {
    const m = ev.match(/responder_retruco\((\w+),\[(.+)\]\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">🤔 TE OFRECIERON RETRUCO</span>', 'event-title');
      log(`Opciones: <span class="highlight">${m[2]}</span>`, 'highlight');
      miTurno = true;
      esperandoInput = true;
      setEnabled(true);
      input.focus();
      hint.textContent = `Opciones: ${m[2].replace(/,/g, ', ')}`;
    }
    return;
  }

  if (ev.startsWith('responder_vale4') && ev.includes(jugador)) {
    const m = ev.match(/responder_vale4\((\w+),\[(.+)\]\)/);
    if (m) {
      log('<span class="separator"></span>', '');
      log('<span class="event-title">🤔 TE OFRECIERON VALE 4</span>', 'event-title');
      log(`Opciones: <span class="highlight">${m[2]}</span>`, 'highlight');
      miTurno = true;
      esperandoInput = true;
      setEnabled(true);
      input.focus();
      hint.textContent = `Opciones: ${m[2].replace(/,/g, ', ')}`;
    }
    return;
  }

  log(`<span class="event-info">[EVENTO] ${ev}</span>`, 'event-info');
}

function enviar() {
  if (!miTurno || !esperandoInput || !ws) return;
  const val = input.value.trim();
  if (!val) return;

  const num = Number(val);
  const payload = Number.isInteger(num) && val !== '' ? num : val;
  ws.send(JSON.stringify({accion: payload}));
  log(`→ <span class="warning">${val}</span>`, 'msg');
  input.value = '';
  setEnabled(false);
  miTurno = false;
  esperandoInput = false;
  hint.textContent = 'Esperando...';
}

function reconnect() {
  overlay.classList.remove('show');
  if (ws) { ws.close(); }
  setTimeout(conectar, 500);
}

connectBtn.addEventListener('click', conectar);
sendBtn.addEventListener('click', enviar);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') enviar(); });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !input.disabled) enviar();
});
</script>
</body>
</html>
